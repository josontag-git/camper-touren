<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Camper Touren</title>
  <meta name="description" content="Private Camper-Urlaubsplanung: Orte, Tage, Routen." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#3a424a" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Camper Touren" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Camper Touren</h1>
    </header>

    <main id="view-root">
      <section id="offline-banner" class="banner hidden" role="status">
        Offline – es werden zuletzt geladene Daten angezeigt.
      </section>

      <section id="trips-view" class="trips-view">
        <div class="trips-toolbar">
          <button id="add-trip-btn" class="btn btn-primary">+ Neuer Urlaub</button>
        </div>
        <div id="empty-state" class="empty-state">
          <p id="empty-state-text">Lade Urlaube …</p>
        </div>
        <ul id="trips-list" class="trips-list"></ul>
      </section>

      <section id="map-view" class="hidden">
        <p class="muted">Kartenansicht folgt in einem späteren Milestone.</p>
      </section>

      <section id="settings-view" class="settings-view hidden">
        <h2>Einstellungen</h2>
        <label for="script-url-input">Apps-Script-Web-App-URL</label>
        <input id="script-url-input" type="url" placeholder="https://script.google.com/macros/s/…/exec" />
        <p class="muted">
          Erzeugt im Google Sheet unter Erweiterungen → Apps Script → Bereitstellen
          → Web App. Details siehe README.
        </p>
        <button id="save-script-url-btn" class="btn btn-primary">Speichern</button>
        <p id="settings-status" class="muted"></p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <button class="nav-item is-active" data-view="trips-view">Urlaube</button>
      <button class="nav-item" data-view="map-view">Karte</button>
      <button class="nav-item" data-view="settings-view">Einstellungen</button>
    </nav>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
